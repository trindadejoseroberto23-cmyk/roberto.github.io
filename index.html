<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Prompts Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.container{
width:90%;
max-width:700px;
background:#1a1a1a;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}
h1{
text-align:center;
margin-bottom:30px;
}
input, textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#00ff88;
color:black;
font-weight:600;
cursor:pointer;
}
.result{
margin-top:20px;
background:#2a2a2a;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
}
</style>
</head>
<body>

<div class="container">
<h1>Gerador de Prompt IA</h1>

<textarea placeholder="Descreva o que deseja criar..."></textarea>

<input type="text" placeholder="Cole uma URL (opcional)">

<input type="file">

<button>Gerar Prompt</button>

<div class="result">
Seu prompt detalhado aparecerá aqui...
</div>
</div>

<script>
document.querySelector("button").addEventListener("click", function(){

let texto = document.querySelector("textarea").value.toLowerCase();
let url = document.querySelector("input[type='text']").value;

if(texto.trim() === ""){
document.querySelector(".result").innerText = "Digite uma descrição primeiro.";
return;
}

let estilo = "";
let composicao = "";
let luz = "";
let tipografia = "";
let cores = "";

if(texto.includes("futebol") || texto.includes("jogador")){
estilo = "Estilo esportivo cinematográfico inspirado em campanhas da Nike e Adidas.";
composicao = "Plano médio em ângulo baixo, jogador centralizado, torcida desfocada ao fundo, profundidade de campo intensa.";
luz = "Iluminação dramática com backlight forte simulando refletores de estádio, chuva destacada com luz lateral.";
tipografia = "Tipografia sans-serif impactante como Bebas Neue ou Oswald para títulos.";
cores = "Paleta com tons escuros, azul profundo, verde gramado vibrante e highlights brancos.";
}
else if(texto.includes("logo")){
estilo = "Estilo minimalista moderno com foco em identidade visual forte.";
composicao = "Logo centralizado em fundo neutro com variações monocromáticas.";
luz = "Iluminação suave de estúdio com sombras leves.";
tipografia = "Tipografia geométrica como Montserrat ou Poppins.";
cores = "Paleta reduzida com 2 a 3 cores principais.";
}
else{
estilo = "Estilo ultra realista com acabamento premium.";
composicao = "Composição equilibrada seguindo regra dos terços.";
luz = "Iluminação cinematográfica suave com contraste controlado.";
tipografia = "Tipografia moderna limpa como Poppins ou Helvetica.";
cores = "Paleta harmônica com contraste equilibrado.";
}

let resultado = `
PROMPT PROFISSIONAL DETALHADO:

Descrição principal:
${texto}

Direção de Arte:
${estilo}

Composição:
${composicao}

Iluminação:
${luz}

Tipografia:
${tipografia}

Paleta de Cores:
${cores}

Configuração Técnica:
Capturado em 85mm f/1.8, ultra high resolution, 8K, textura realista, nitidez extrema, profundidade de campo cinematográfica.

Referência opcional:
${url || "Nenhuma"}
`;

document.querySelector(".result").innerText = resultado;

});
</script>
  
</body>
</html>
