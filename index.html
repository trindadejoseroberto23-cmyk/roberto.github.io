<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Prompts Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style> <script>
document.querySelector("button").addEventListener("click", function(){

let texto = document.querySelector("textarea").value;
let url = document.querySelector("input[type='text']").value;

let resultado = `
Crie uma imagem ultra realista baseada na seguinte descrição:

${texto}

Caso exista referência visual na URL:
${url}

A imagem deve conter iluminação cinematográfica, detalhes em alta definição, textura realista, profundidade de campo e cores vibrantes.
`;

document.querySelector(".result").innerText = resultado;

});
</script>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.container{
width:90%;
max-width:700px;
background:#1a1a1a;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}
h1{
text-align:center;
margin-bottom:30px;
}
input, textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#00ff88;
color:black;
font-weight:600;
cursor:pointer;
}
.result{
margin-top:20px;
background:#2a2a2a;
padding:20px;
border-radius:10px;
}
</style>
</head>
<body>
<div class="container">
<h1>Gerador de Prompt IA</h1>

<textarea placeholder="Descreva o que deseja criar..."></textarea>

<input type="text" placeholder="Cole uma URL (opcional)">

<input type="file">

<button>Gerar Prompt</button>

<div class="result">
Seu prompt detalhado aparecerá aqui...
</div>

</div>
</body>

</html>
