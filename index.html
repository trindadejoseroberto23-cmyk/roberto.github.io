<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERATIVAFM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('logo.png') no-repeat center center/cover;
    height: 100vh;
    color: white;
}

/* fundo escuro */
.overlay {
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* logo */
.logo {
    width: 250px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(255,255,255,0.3);
}

/* player */
.player {
    margin-top: 20px;
    width: 90%;
    max-width: 350px;
    border-radius: 15px;
    overflow: hidden;
}

/* chat */
.chat-box {
    margin-top: 25px;
    width: 90%;
    max-width: 400px;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
}

.chat-header {
    padding: 10px;
    text-align: center;
    background: linear-gradient(45deg, #ff00cc, #3333ff);
    font-weight: bold;
}

.chat-frame {
    width: 100%;
    height: 300px;
    border: none;
}
</style>

</head>

<body>

<div class="overlay">

    <img src="logo.png" class="logo">

    <!-- PLAYER OFICIAL -->
    <div class="player">
        <iframe 
        src="https://uk4freenew.listen2myradio.com/player.php"
        width="100%" 
        height="150" 
        frameborder="0"
        allow="autoplay">
        </iframe>
    </div>

    <!-- CHAT -->
    <div class="chat-box">
        <div class="chat-header">💬 CHAT AO VIVO</div>

        <iframe 
        src="https://uk4freenew.listen2myradio.com/chat/frame.php?frameid=2818928"
        class="chat-frame">
        </iframe>
    </div>

</div>

</body>
</html>
